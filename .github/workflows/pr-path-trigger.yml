name: PR Path Trigger

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  pr-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print trigger message
        run: echo "PR triggered by changes in src/ directory"
