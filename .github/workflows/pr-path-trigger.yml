name: PR Path Trigger

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  check-src-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify src change detected
        run: echo "Changes detected in src/ directory!"
